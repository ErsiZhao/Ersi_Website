<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ersi Zhao</title>
    <link rel="stylesheet" href="menu.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        overflow: hidden;
        height: 100vh;
      }
      header {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      background-color: #000;
      padding: 1rem;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
       h1 {
      margin-top: 0;
      font-size: 3rem;
    }

    p {
      line-height: 1.6;
      margin-bottom: 1rem;
    }

      .carousel {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      .slides-wrapper {
        display: flex;
        height: 100vh;
        transition: transform 0.65s cubic-bezier(0.77, 0, 0.175, 1);
        will-change: transform;
      }

      .slide {
        width: 100vw;
        height: 100vh;
        flex-shrink: 0;
        position: relative;
      }

      .slide-title {
        position: absolute;
        bottom: 3.8rem;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 8rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        text-shadow: 0 2px 10px rgba(0,0,0,0.7);
        white-space: nowrap;
        pointer-events: none;
        z-index: 10;
      }

      .slide-1 {
        position: relative;
        overflow: hidden;
      }

      .slide-1 iframe {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        /* Cover technique: always fill the viewport, clip the excess */
        width: 100vw;
        height: 56.25vw;   /* 16:9 → height = width × 9/16 */
        min-height: 100vh;
        min-width: 177.78vh; /* 16:9 → width = height × 16/9 */
        border: none;
      }

      .slide-2 {
        background: url("images/7_clouds.png") center/cover no-repeat;
      }

      .slide-3 {
        background: url('images/4_spotify_v03.png') center/cover no-repeat;
      }

      .arrow {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: white;
        font-size: 4rem;
        cursor: pointer;
        z-index: 500;
        padding: 1rem 1.5rem;
        opacity: 0.55;
        transition: opacity 0.2s, transform 0.2s;
        user-select: none;
        line-height: 1;
      }

      .arrow:hover {
        opacity: 1;
        transform: translateY(-50%) scale(1.15);
      }

      .arrow-left  { left: 1rem; }
      .arrow-right { right: 1rem; }

      .arrow.hidden {
        visibility: hidden;
        pointer-events: none;
      }

      /* slide counter dots */
      .dots {
        position: fixed;
        bottom: 1.8rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 0.6rem;
        z-index: 500;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255,255,255,0.35);
        transition: background 0.3s;
      }

      .dot.active {
        background: rgba(255,255,255,0.9);
      }

      html.menu-open, body.menu-open { overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="menu-host"></div>
    <script src="menu.js"></script>

    <div class="carousel">
      <div class="slides-wrapper" id="slidesWrapper">

        <!-- Slide 1: YouTube video -->
        <div class="slide slide-1">
          <iframe id="ytFrame"
            src="https://www.youtube.com/embed/Z1UpU7yuO_U?autoplay=1&mute=1&loop=1&playlist=Z1UpU7yuO_U&controls=1"
            allow="autoplay; fullscreen"
            allowfullscreen>
          </iframe>
          <div class="slide-title">Reel</div>
        </div>

        <!-- Slide 2: Image -->
        <div class="slide slide-2">
          <div class="slide-title">NF Clouds</div>
        </div>

        <!-- Slide 3: Image -->
        <div class="slide slide-3">
          <div class="slide-title">Spotify Hit Station</div>
        </div>

      </div>

      <button class="arrow arrow-left hidden" id="arrowLeft">&#8592;</button>
      <button class="arrow arrow-right"        id="arrowRight">&#8594;</button>

      <div class="dots" id="dots"></div>
    </div>

    <script>
      const wrapper  = document.getElementById('slidesWrapper');
      const btnLeft  = document.getElementById('arrowLeft');
      const btnRight = document.getElementById('arrowRight');
      const ytFrame  = document.getElementById('ytFrame');
      const dotsEl   = document.getElementById('dots');

      const YT_SRC = ytFrame.src;
      const TOTAL  = 3;
      let current  = 0;

      // Build dots
      for (let i = 0; i < TOTAL; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        dotsEl.appendChild(d);
      }

      function goTo(n) {
        if (n < 0 || n >= TOTAL) return;

        // Pause YouTube when leaving slide 0
        if (current === 0 && n !== 0) ytFrame.src = '';
        // Resume YouTube when returning to slide 0
        if (n === 0 && current !== 0) ytFrame.src = YT_SRC;

        current = n;
        wrapper.style.transform = `translateX(-${current * 100}vw)`;

        btnLeft.classList.toggle('hidden', current === 0);
        btnRight.classList.toggle('hidden', current === TOTAL - 1);

        document.querySelectorAll('.dot').forEach((d, i) =>
          d.classList.toggle('active', i === current)
        );
      }

      btnLeft.addEventListener('click',  () => goTo(current - 1));
      btnRight.addEventListener('click', () => goTo(current + 1));

      // Keyboard support
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft')  goTo(current - 1);
        if (e.key === 'ArrowRight') goTo(current + 1);
      });
    </script>
  </body>
  </html>
