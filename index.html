    :root {
      --aspect-ratio: 1;
      --button-color: rgba(199, 158, 53, 0.19);

      --overlay-opacity: 0;
      --image-gap: 0rem;
      --parallax-factor: 0.2;
      --title-font-size: 2rem;
      --description-font-size: 1rem;
      --visible-image-height: 500px;
      --base-visible-height: 400;
      --base-title-size: 2; /* rem */
      --base-description-size: 1; /* rem */
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gallery-item {
      position: relative;
      width: 100vw;
      max-width: 100%;
      height: var(--visible-image-height);
      overflow: hidden;
    }

    .gallery-item img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.05s linear;
      will-change: transform;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background-color: rgba(var(--overlay-bg-color), var(--overlay-opacity));
      padding: 1rem;
      border-radius: 10px;
    }

    .overlay h2 {
      margin: 0 0 0.5rem 0;
      font-size: var(--title-font-size);
    }

    .overlay p {
      font-size: var(--description-font-size);
    }

    .overlay a {
      display: inline-block;
      padding: 0.5rem 1rem;
      background-color: var(--button-color);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 1rem;
    }

    /* Responsive tweak for vertical screens */
    @media (max-aspect-ratio: 3/4) {
      :root {
        --image-height: 75vh;
        --aspect-ratio: 0.6;
        --title-font-size: 2.2rem;
        --description-font-size: 1.2rem;
      }
    }

    /* prevent scrolling while menu is visible */
    html.menu-open, body.menu-open { overflow: hidden; }

/* =========================
Floating Banner start
========================= */

.float-banner {
  position: fixed;
  top: calc(env(safe-area-inset-top) + 16px);
  left: 50%;
  transform: translate(-50%, -10px);
  width: min(900px, calc(100vw - 24px));
  z-index: 9999;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.float-banner.show {
  opacity: 1;
  transform: translate(-50%, 0);
  pointer-events: auto;
}

.float-banner__inner {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 12px;
  align-items: center;

  padding: 12px 16px;
  border-radius: 14px;

  background: rgba(20,20,20,0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 18px 50px rgba(0,0,0,0.5);
}

.float-banner__text {
  font-size: 14px;
  color: rgba(255,255,255,0.9);
}

.float-banner__link {
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(199,158,53,0.25);
  border: 1px solid rgba(199,158,53,0.35);
  color: #fff;
  font-size: 14px;
}

.float-banner__close {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: white;
  cursor: pointer;
}

/* Mobile stacking */
@media (max-width: 600px) {
  .float-banner__inner {
    grid-template-columns: 1fr auto;
    grid-template-areas:
      "text close"
      "link close";
  }

  .float-banner__text { grid-area: text; }
  .float-banner__link { grid-area: link; }
  .float-banner__close { grid-area: close; }
}

  <script>
    // ---------- readiness gate ----------
    let galleryReadyResolve;
    const galleryReady = new Promise((resolve) => (galleryReadyResolve = resolve));

    // ---------- Build gallery from JSON ----------
    fetch('projects.json')
      .then(r => r.json())
      .then(async (data) => {
        const gallery = document.getElementById('gallery');

        data.forEach((project) => {
          const item = document.createElement('div');
          item.className = 'gallery-item';

          const img = document.createElement('img');
          img.src = project.image;
          img.alt = project.title;
          img.dataset.offset = project.offset || 0;

          const overlay = document.createElement('div');
          overlay.className = 'overlay';
          overlay.innerHTML = `
            <h2>${project.title}</h2>
            <p style="margin: 0.5rem 0 1rem 0; font-size: var(--description-font-size); color: #ccc;">
              ${project.description || ''}
            </p>
            <a href="${project.youtube}" target="_blank" rel="noopener noreferrer">${project.buttonText}</a>
          `;
          item.appendChild(img);
          item.appendChild(overlay);
          gallery.appendChild(item);
        });

        // Wait until images are decodable/paintable
        const imgs = [...document.querySelectorAll('.gallery-item img')];
        await Promise.all(
          imgs.map((img) =>
            (img.decode ? img.decode() : Promise.resolve()).catch(() => {
              return new Promise((res) => {
                if (img.complete) return res();
                img.addEventListener('load', res, { once: true });
                img.addEventListener('error', res, { once: true });
              });
            })
          )
        );

        updateLayoutSizes();
        applyParallax();

        galleryReadyResolve();
      })
      .catch(err => {
        console.error('Failed to load projects.json', err);
        galleryReadyResolve();
      });





    // ---------- Parallax ----------
    let ticking = false;
    const parallaxFactor = 0.2;

    function applyParallax() {
      const images = document.querySelectorAll('.gallery-item img');
      const windowHeight = window.innerHeight;

      images.forEach((img) => {
        const item = img.closest('.gallery-item');
        const rect = item.getBoundingClientRect();
        const center = rect.top + rect.height / 2 - windowHeight / 2;
        const offset = parseFloat(img.dataset.offset || 0);
        img.style.transform = `translate(-50%, calc(-50% + ${offset + center * -parallaxFactor}px))`;
      });

      ticking = false;
    }
    window.addEventListener('scroll', () => {
      if (!ticking) {
        window.requestAnimationFrame(applyParallax);
        ticking = true;
      }
    });





    // ---------- Responsive sizing ----------
    function updateLayoutSizes() {
      const aspect = window.innerWidth / window.innerHeight;

      const baseTitle = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--base-title-size'));
      const baseDesc  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--base-description-size'));
      const fontScale = aspect / 1.7;

      document.documentElement.style.setProperty('--title-font-size', `${baseTitle * fontScale}rem`);
      document.documentElement.style.setProperty('--description-font-size', `${baseDesc * fontScale}rem`);

      const baseVisibleHeight = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--base-visible-height'));
      const heightScale = aspect / 1.7;
      document.documentElement.style.setProperty('--visible-image-height', `${baseVisibleHeight * heightScale}px`);
    }

    window.addEventListener('resize', () => {
      updateLayoutSizes();
      applyParallax();
    });
    window.addEventListener('load', () => {
      updateLayoutSizes();
      applyParallax();
    });

  (() => {
    const wrapper    = document.getElementById('slidesWrapper');
    const btnLeft    = document.getElementById('arrowLeft');
    const btnRight   = document.getElementById('arrowRight');
    const dotsEl     = document.getElementById('dots');
    const slide1     = document.getElementById('slide1');
    const slide2Vid  = document.getElementById('slide2Video');
    const modal      = document.getElementById('videoModal');
    const modalClose = document.getElementById('modalClose');
    const ytFrame    = document.getElementById('ytFrame');

    const REEL_SRC   = 'https://www.youtube.com/embed/Z1UpU7yuO_U?autoplay=1&controls=1&vq=hd1080';
    const SLIDE2_SRC = 'https://www.youtube.com/embed/Wb7lNjQLUk8?autoplay=1&mute=1&controls=0&loop=1&playlist=Wb7lNjQLUk8&rel=0';
    const TOTAL      = 4;
    let current      = 0;


    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      dotsEl.appendChild(d);
    }

    function goTo(n) {
      if (n < 0 || n >= TOTAL) return;
      current = n;
      wrapper.style.transform = `translateX(-${current * 100}vw)`;
      btnLeft.classList.toggle('hidden', current === 0);
      btnRight.classList.toggle('hidden', current === TOTAL - 1);
      document.querySelectorAll('.dot').forEach((d, i) =>
        d.classList.toggle('active', i === current)
      );
      slide2Vid.src = (current === 1) ? SLIDE2_SRC : '';
    }

    btnLeft.addEventListener('click',  () => goTo(current - 1));
    btnRight.addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', (e) => {
      if (modal.classList.contains('open')) {
        if (e.key === 'Escape') closeModal();
        return;
      }
      if (e.key === 'ArrowLeft')  goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    let cursorTimer;

    function resetCursorTimer() {
      modal.style.cursor = '';
      clearTimeout(cursorTimer);
      cursorTimer = setTimeout(() => { modal.style.cursor = 'none'; }, 3000);
    }

    slide1.addEventListener('click', () => {
      ytFrame.src = REEL_SRC;
      modal.classList.add('open');
      resetCursorTimer();
    });

    modal.addEventListener('mousemove', () => {
      if (modal.classList.contains('open')) resetCursorTimer();
    });

    function closeModal() {
      ytFrame.src = '';
      modal.classList.remove('open');
      modal.style.cursor = '';
      clearTimeout(cursorTimer);
    }

    modalClose.addEventListener('click', closeModal);


    // Scroll arrow hint
      // Scroll hint — visible at top, hides when scrolled down, returns when back
      const scrollHint = document.getElementById('scrollHint');
      setTimeout(() => scrollHint.classList.add('visible'), 800);
      window.addEventListener('scroll', () => {
        if (window.scrollY < 50) {
          scrollHint.classList.add('visible');
        } else {
          scrollHint.classList.remove('visible');
        }
      });

  })();
  </script>

</body>
